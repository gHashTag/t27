# IGLA-TTT-LoRA: Test-Time Training with LoRA Adapters
# Agent: HOTEL
# Target: ~-0.03 BPB
# Note: Different from JEPA-TTT - uses parameter-efficient LoRA for fast adaptation

[experiment]
id = "IGLA-TTT-LoRA"
agent = "HOTEL"
description = "Test-Time Training with LoRA adapters - lightweight adaptation on validation tokens"
target_delta_bpb = -0.03
status = "queued"
created_at = "2026-04-21T06:14:00Z"

[params]
# Dataset
data_path = "./data/datasets/fineweb10B_sp1024"
tokenizer_path = "./data/tokenizers/fineweb_1024_bpe.model"
vocab_size = 1024

# Model Architecture
num_layers = 10
model_dim = 512
num_heads = 8
num_kv_heads = 4
mlp_mult = 3.0
tie_embeddings = true

# BigramHash
bigram_vocab_size = 0
bigram_dim = 128

# LoRA Configuration
lora_enabled = true
lora_rank = 8                # Low-rank adapter
lora_alpha = 16              # LoRA alpha
lora_target_modules = ["attn.c_q", "attn.c_k", "attn.c_v", "attn.proj", "mlp.fc", "mlp.proj"]
lora_dropout = 0.05

# TTT Configuration
ttt_enabled = true
ttt_steps = 50               # Fast adaptation steps
ttt_lr = 0.01                # Higher LR for fast adaptation
ttt_batch_size = 4096        # Small batch for speed

# Training
iterations = 20000
train_batch_tokens = 786_432
train_seq_len = 2048
val_batch_size = 524_288
val_loss_every = 500
max_wallclock_seconds = 600.0

# Learning Rates
tied_embed_lr = 0.1
embed_lr = 0.6
head_lr = 0.008
matrix_lr = 0.02
scalar_lr = 0.02
lora_lr = 0.05

# Muon Optimizer
muon_momentum = 0.99
muon_backend_steps = 5
weight_decay = 0.04

# SWA
swa_enabled = true
swa_start_frac = 0.5
swa_every = 50

# Evaluation
eval_stride = 64
eval_batch_seqs = 32

# Init
qk_gain_init = 1.5
logit_softcap = 30.0
rope_base = 10000.0

# Warmup
warmup_steps = 20
warmdown_iters = 3000

[expected]
val_bpb = "~1.08"  # -0.03 from ~1.11 baseline
lora_params = "~0.5M extra params for TTT"
ttt_speed = "<30ms adaptation"
compression_ratio = "int6 + zstd-22"
