name: L1 TRACEABILITY Fix
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main]

jobs:
  check-traceability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Closes #N in commits
        id: check
        run: |
          set -euo pipefail
          
          # Get base branch
          BASE="${{ github.base_ref || 'master' }}"
          
          echo "Checking commits against $BASE..."
          
          # Get commit hashes in range, excluding merge commits
          COMMIT_HASHES=$(git log origin/"$BASE"..HEAD --format="%H" --no-merges 2>/dev/null || echo "")
          
          if [ -z "$COMMIT_HASHES" ]; then
            echo "No commits to check (likely first push)"
            exit 0
          fi
          
          # Check each commit for Closes #N pattern
          FAILED=0
          FAILED_COMMITS=""
          TOTAL=0
          PASSED=0
          
          while IFS= read -r hash; do
            if [ -z "$hash" ]; then
              continue
            fi
            
            TOTAL=$((TOTAL + 1))
            
            # Get full commit message
            FULL_MSG=$(git log -1 --format="%B" "$hash")
            
            # Check for Closes #N, Fixes #N, or Resolves #N pattern
            # Case-insensitive match, followed by # and space, then issue number
            if echo "$FULL_MSG" | grep -qiE '(closes|fixes|resolves)\s*#[0-9]+'; then
              PASSED=$((PASSED + 1))
            else
              FAILED=1
              FAILED_COMMITS="$FAILED_COMMITS  ❌ $(git log -1 --format="%h %s" "$hash")"$'\n'
            fi
          done <<< "$COMMIT_HASHES"
          
          echo ""
          echo "L1 TRACEABILITY Summary"
          echo "===================="
          echo "Total commits: $TOTAL"
          echo "Passed: $PASSED"
          echo "Failed: $FAILED"
          echo ""
          
          if [ $FAILED -eq 1 ]; then
            echo "::error::L1 TRACEABILITY violation: Found $FAILED commit(s) without issue reference."
            echo "::error::The following commits are missing issue references:"
            echo "$FAILED_COMMITS"
            echo "::error::Constitutional Law L1 requires all code changes to reference a GitHub issue."
            echo "::error::Usage: Include 'Closes #N' in your PR title or body."
            echo "::error::Example: 'feat(compiler): Add algorithm codegen placeholder'"
            echo "::error::         Closes #42'"
            exit 1
          fi
          
          echo "::notice::L1 TRACEABILITY check passed: All $TOTAL commits comply with issue reference requirement."
          echo "✅ Passed commit: $(git log -1 --format="%h")"
