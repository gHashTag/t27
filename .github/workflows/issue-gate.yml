name: Issue Gate
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches: [master]

permissions:
  issues: read
  pull-requests: write

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issues via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUES=$(gh api graphql \
            -F owner='${{ github.repository_owner }}' \
            -F repo='${{ github.event.repository.name }}' \
            -F pr=${{ github.event.pull_request.number }} \
            -f query='query($owner:String!,$repo:String!,$pr:Int!){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$pr){
                  closingIssuesReferences(first:10){
                    nodes{number state}
                  }
                }
              }
            }' --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUES" ]; then
            echo "::error::No linked issues found. PR must contain 'Closes #N' in description."
            exit 1
          fi
          echo "Linked issues: $ISSUES"
