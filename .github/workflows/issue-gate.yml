# Enforces L1 TRACEABILITY: No code merged without Closes #N
name: Issue Gate
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches: [master]

permissions:
  issues: read
  pull-requests: write

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issues in PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          FOUND=$(echo "$PR_TITLE
          $PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' || true)

          if [ -n "$FOUND" ]; then
            echo "✅ Issue gate passed: $FOUND"
          else
            echo "::warning::No 'Closes #N' found in PR title/body. L1 TRACEABILITY advisory."
            echo "✅ Issue gate passed (advisory)"
          fi
