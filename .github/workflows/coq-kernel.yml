name: Coq kernel
on:
  push:
    paths:
      - 'coq/**'
      - '.github/workflows/coq-kernel.yml'
  pull_request:
    branches: [master]
    paths:
      - 'coq/**'
      - '.github/workflows/coq-kernel.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: coqorg/coq:8.19-ocaml-4.14-flambda
    steps:
      - uses: actions/checkout@v4

      - name: Install Flocq (opam)
        run: |
          opam update -y
          opam install -y coq-flocq

      - name: Build coq/ (T27 + Flocq)
        run: |
          eval $(opam env)
          cd coq
          coq_makefile -f _CoqProject -o CoqMakefile
          make -f CoqMakefile -j$(nproc)

      - name: coqchk PhiFloat (consistency)
        run: |
          eval $(opam env)
          cd coq
          coqchk -silent -R . T27 T27.Kernel.PhiFloat

      - name: Validate phi f64 parameters (Python)
        run: python3 scripts/validate_phi_f64.py

      - name: Verify Kernel PHI layer has no Admitted
        run: |
          if grep -n 'Admitted' coq/Kernel/Phi.v coq/Kernel/PhiFloat.v 2>/dev/null; then
            echo "ERROR: Admitted remains in Phi / PhiFloat" >&2
            exit 1
          fi
          echo "OK: no Admitted in Phi.v or PhiFloat.v"
