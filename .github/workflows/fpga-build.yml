name: FPGA E2E Build

on:
  pull_request:
    branches: [master]
    paths:
      - 'specs/fpga/**'
      - 'bootstrap/**'
      - 'cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/fpga-build.yml'
  push:
    branches: [master]
    paths:
      - 'specs/fpga/**'
      - 'bootstrap/**'
      - 'cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/fpga-build.yml'
  workflow_dispatch:

jobs:
  fpga-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fpga-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fpga-

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys

      - name: Build t27c
        run: cargo build --release -p t27c

      - name: FPGA smoke test (Verilog generation only)
        run: ./target/release/t27c fpga-build --smoke

      - name: Verilog regression check
        run: |
          echo "## Verilog hash regression" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size (bytes) | SHA256 (first 16) |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|-------------------|" >> $GITHUB_STEP_SUMMARY
          for v in build/fpga/generated/*.v; do
            name=$(basename "$v")
            size=$(wc -c < "$v" | tr -d ' ')
            hash=$(shasum -a 256 "$v" | cut -c1-16)
            echo "| $name | $size | $hash |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          total_size=$(du -sb build/fpga/generated/ | cut -f1)
          total_files=$(ls build/fpga/generated/*.v | wc -l)
          echo "**Total:** $total_files files, $total_size bytes" >> $GITHUB_STEP_SUMMARY

      - name: Upload generated Verilog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpga-verilog
          path: build/fpga/generated/
          retention-days: 7

  fpga-synthesis:
    needs: fpga-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fpga-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fpga-

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys

      - name: Build t27c
        run: cargo build --release -p t27c

      - name: FPGA synthesis (Yosys + JSON netlist)
        run: ./target/release/t27c fpga-build --docker false --synth-only

      - name: Synthesis regression check
        run: |
          if [ ! -f build/fpga/synth/synth.json ]; then
            echo "::error::synth.json not produced"
            exit 1
          fi
          size=$(wc -c < build/fpga/synth/synth.json | tr -d ' ')
          echo "## Synthesis regression" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| synth.json size | $size bytes |" >> $GITHUB_STEP_SUMMARY
          hash=$(shasum -a 256 build/fpga/synth/synth.json | cut -c1-16)
          echo "| synth.json SHA256 | $hash... |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$size" -lt 1000 ]; then
            echo "::warning::synth.json suspiciously small ($size < 1000 bytes)"
          fi

      - name: Upload synthesis output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpga-synthesis
          path: |
            build/fpga/generated/
            build/fpga/synth/
          retention-days: 7

  fpga-bitstream:
    needs: fpga-synthesis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Cargo + FPGA tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ~/.local/bin/nextpnr-xilinx
            ~/prjxray-build
          key: ${{ runner.os }}-fpga-tools-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-fpga-tools-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys git cmake g++ pkg-config libboost-dev python3-pip
        
      - name: Build t27c
        run: cargo build --release -p t27c
      
      - name: Build nextpnr-xilinx
        run: |
          if [ ! -f ~/.local/bin/nextpnr-xilinx ]; then
            cd ~
            git clone https://github.com/YosysHQ/nextpnr.git -b nextpnr-0.8
            cd nextpnr
            mkdir build && cd build
            cmake .. -DARCH=xilinx -DUSE_OPENMP=OFF
            make -j4
            cp nextpnr-xilinx ~/.local/bin/
          fi
      
      - name: Build prjxray tools
        run: |
          if [ ! -f ~/prjxray-build/xc7frames2bit ]; then
            cd ~
            git clone https://github.com/SymbiFlow/prjxray.git
            cd prjxray
            mkdir build && cd build
            cmake ..
            make xc7frames2bit
            cp xc7frames2bit ~/prjxray-build/
          fi
      
      - name: Download prjxray database
        run: |
          mkdir -p ~/prjxray-db
          cd ~/prjxray-db
          if [ ! -d "artix7" ]; then
            git clone --depth 1 https://github.com/SymbiFlow/prjxray-db artix7
          fi
      
      - name: Create chipdb symlink
        run: |
          mkdir -p ~/fpga/chipdb
          # Create minimal chipdb for testing (1MB placeholder)
          dd if=/dev/zero of=~/fpga/chipdb/xc7a100tcsg324-1.bin bs=1024 count=1024
      
      - name: Generate bitstream
        run: |
          ./target/release/t27c fpga-build --board qmtech-a100t --profile minimal
          ls -la build/fpga/
      
      - name: Upload bitstream artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpga-bitstream-${{ github.sha }}
          path: build/fpga/bitstream.bit
          retention-days: 7
          
      - name: Bitstream metrics
        run: |
          echo "## FPGA Bitstream Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f build/fpga/bitstream.bit ]; then
            size=$(wc -c < build/fpga/bitstream.bit | tr -d ' ')
            echo "| Bitstream size | $size bytes |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
            echo "| Board | QMTECH XC7A100T |" >> $GITHUB_STEP_SUMMARY
            echo "| Profile | minimal |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  fpga-report:
    needs: [fpga-smoke, fpga-synthesis, fpga-bitstream]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## FPGA E2E Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke (gen-only) | ${{ needs.fpga-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Synthesis (Yosys) | $ needs.fpga-synthesis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bitstream (E2E) | ${{ needs.fpga-bitstream.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Toolchain: Yosys + nextpnr-xilinx + prjxray + t27c (Rust) | Zero Vivado | Profile: minimal" >> $GITHUB_STEP_SUMMARY
