name: Seal Coverage Gate

on:
  pull_request:
    branches: [master]
    paths:
      - 'specs/**/*.t27'
      - '.trinity/seals/**'
      - 'conformance/**'

jobs:
  seal-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build compiler (t27c)
        working-directory: bootstrap
        run: cargo build --release

      - name: 🔒 Seal Coverage Check (PR-scoped, Rust)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Get changed .t27 files in specs/
          CHANGED_FILES=$(gh api \
            repos/gHashTag/t27/pulls/$PR_NUMBER/files \
            --jq '.[].filename' | grep '^specs/.*\.t27$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No .t27 spec files changed in this PR. Gate PASS."
            exit 0
          fi

          # Build comma-separated list for t27c
          PR_FILES=$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//')

          # Call Rust validator (NO-SHELL law)
          ./bootstrap/target/release/t27c --repo-root . validate-seals --pr-files "$PR_FILES"
