name: SEAL Coverage

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed specs
        id: changed-specs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(gh api \
              repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
              --jq '.[].filename' 2>/dev/null || echo "")
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          fi
          SPECS_CHANGED=$(echo "$CHANGED_FILES" | grep -E '\.t27$' || echo "")
          if [ -n "$SPECS_CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build t27c
        if: steps.changed-specs.outputs.changed == 'true'
        run: cargo build --release -p t27c

      - name: Run seal verification
        if: steps.changed-specs.outputs.changed == 'true'
        run: |
          echo "Running SEAL coverage analysis..."
          FAILURES=$(./target/release/t27c suite 2>&1 | grep "Seal mismatches" | awk '{print $NF}')
          if [ "$FAILURES" != "0" ]; then
            echo "::error::$FAILURES seal mismatches detected"
            exit 1
          fi
          echo "All seal hashes verified successfully"
