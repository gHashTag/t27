name: PHI Loop CI

on:
  pull_request:
    branches: [master]

jobs:
  phi-loop-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHI Loop identity check
        run: |
          echo "PHI Loop CI: L5 identity invariant verification"
          echo "phi^2 + phi^-2 = 3 (IEEE f64 tolerance)"
          python3 -c "phi = (1.0 + 5.0**0.5) / 2.0; identity = phi**2 + phi**(-2); assert abs(identity - 3.0) < 1e-10; print('L5 PASSED')"

      - name: FPGA-Safety lint
        run: |
          grep -rn 'as f64' ffi/src/ --include='*.rs' 2>/dev/null | grep -v 'to_bits\|from_bits\|FPGA-ALLOWED' | grep -v '//.*f32\|//.*f64' && echo "L8 FAILED" && exit 1 || echo "L8 PASSED"
