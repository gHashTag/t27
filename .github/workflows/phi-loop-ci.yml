name: PHI Loop CI
on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build compiler (t27c) + tri shim
        working-directory: bootstrap
        run: cargo build --release

      - name: Ensure tri shim is executable
        run: chmod +x scripts/tri

      - name: Run comprehensive test suite (t27c suite)
        run: ./bootstrap/target/release/t27c suite --repo-root .

      - name: Validate conformance vectors
        run: ./bootstrap/target/release/t27c validate-conformance --repo-root .

      - name: Validate gen headers
        run: ./bootstrap/target/release/t27c validate-gen-headers --repo-root .

      - name: Verify seal coverage
        run: |
          SPECS=$(find specs -name '*.t27' | wc -l)
          SEALS=$(find .trinity/seals -name '*.json' | wc -l)
          echo "Specs: $SPECS, Seals: $SEALS"
          echo "phi^2 + 1/phi^2 = 3 | TRINITY"

      - name: First-party docs must be English (Cyrillic check)
        run: bash scripts/check-first-party-doc-language.sh
