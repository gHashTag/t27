name: PHI Loop CI
on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build t27c
        working-directory: bootstrap
        run: cargo build --release

      - name: Parse all specs
        run: |
          FAIL=0
          for f in specs/**/*.t27 compiler/**/*.t27; do
            [ -f "$f" ] || continue
            ./bootstrap/target/release/t27c parse "$f" > /dev/null 2>&1 || { echo "FAIL: $f"; FAIL=$((FAIL+1)); }
          done
          echo "Parse failures: $FAIL"
          [ $FAIL -eq 0 ] || exit 1

      - name: Gen all specs
        run: |
          FAIL=0
          for f in specs/**/*.t27 compiler/**/*.t27; do
            [ -f "$f" ] || continue
            ./bootstrap/target/release/t27c gen "$f" > /dev/null 2>&1 || { echo "FAIL: $f"; FAIL=$((FAIL+1)); }
          done
          echo "Gen failures: $FAIL"
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify seals
        run: |
          for f in specs/**/*.t27; do
            [ -f "$f" ] || continue
            ./bootstrap/target/release/t27c seal "$f" --verify 2>&1 || true
          done
