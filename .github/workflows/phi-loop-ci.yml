name: PHI Loop CI
on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build t27c
        working-directory: bootstrap
        run: cargo build --release

      - name: Run comprehensive test suite
        run: bash tests/run_all.sh
