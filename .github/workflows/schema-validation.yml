name: Validate JSON Schemas

on:
  pull_request:
    branches: [master, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON schemas
        run: |
          ERRORS=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./target/*" -not -path "./.git/*" -not -path "./external/*"); do
              if [ ! -s "$f" ]; then continue; fi
              if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS invalid JSON files found"
            exit 1
          fi
          echo "All JSON files valid"
