name: PR Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  pull_request:
    types: [opened, synchronize]
    branches: [master, main]

permissions:
  pull-requests: read

jobs:
  pr-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR status
        id: pr-status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "# PR Dashboard" > /tmp/pr_dashboard.md
          echo "" >> /tmp/pr_dashboard.md
          echo "Generated at: $(date -u '+%Y-%m-%d %H:%M:%S %Z')" >> /tmp/pr_dashboard.md

          PR_DATA=$(gh pr list --state open --limit 50 --json number,title,headRefName,createdAt,updatedAt,statusCheckRollup 2>/dev/null || echo "[]")

          if [ "$PR_DATA" = "[]" ] || [ -z "$PR_DATA" ]; then
            echo "No open PRs found" >> /tmp/pr_dashboard.md
            echo "PR_COUNT=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$PR_DATA" | jq -r '.[] | "# \(.number) | \(.title) | \(.headRefName) | Created: \(.createdAt | split("T")[0]) | Updated: \(.updatedAt | split("T")[0])"' >> /tmp/pr_dashboard.md

          echo "" >> /tmp/pr_dashboard.md

          TOTAL=$(echo "$PR_DATA" | jq 'length')
          FAILING=$(echo "$PR_DATA" | jq '[.[] | .statusCheckRollup // [] | map(select(.conclusion != "SUCCESS" and .conclusion != "SKIPPED" and .conclusion != null)) | length | select(. > 0)] | length')

          echo "## Summary" >> /tmp/pr_dashboard.md
          echo "" >> /tmp/pr_dashboard.md
          echo "| Metric | Count |" >> /tmp/pr_dashboard.md
          echo "| --- | --- |" >> /tmp/pr_dashboard.md
          echo "| Total Open PRs | $TOTAL |" >> /tmp/pr_dashboard.md
          echo "| PRs with Failing Checks | $FAILING |" >> /tmp/pr_dashboard.md
          echo "| PRs with All Checks Green | $((TOTAL - FAILING)) |" >> /tmp/pr_dashboard.md

          echo "PR_COUNT=$TOTAL" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue Comment
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 1 --body-file /tmp/pr_dashboard.md || echo "Issue comment skipped"

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment $PR_NUMBER --body-file /tmp/pr_dashboard.md || echo "PR comment skipped"
