version: "3.9"

# T27 SWE Agent Sandbox — Local Development Stack
# Usage:
#   docker compose up -d
#   docker compose logs -f api
#   docker compose down -v  (remove volumes too)
#
# Requires: backend/api/Dockerfile, backend/sandbox/Dockerfile
# Env overrides: copy .env.example to .env and fill in secrets

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL — Session store & experience episodes
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: t27-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: t27
      POSTGRES_USER: t27
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-t27dev}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d:ro  # run migrations on first start
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U t27 -d t27"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - t27-internal

  # ─────────────────────────────────────────────────────────────────────────
  # Control Plane API — Rust / Axum
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: t27-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgres://t27:${POSTGRES_PASSWORD:-t27dev}@db:5432/t27

      # API authentication
      T27_API_TOKEN: ${T27_API_TOKEN:-}

      # Railway accounts (comma-separated JSON objects for multi-account pool)
      # Format: TOKEN:PROJECT_ID:ENVIRONMENT_ID
      RAILWAY_ACCOUNTS: ${RAILWAY_ACCOUNTS:-}

      # Sandbox configuration defaults
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-ghcr.io/t27/sandbox:latest}
      SANDBOX_PORT: "8080"
      MAX_SESSIONS: "100"
      HEALTH_TIMEOUT_MS: "3000"
      STARTUP_TIMEOUT_MS: "90000"
      HEALTH_POLL_INTERVAL_MS: "5000"

      # Logging
      RUST_LOG: ${RUST_LOG:-info,t27_api=debug}
      RUST_BACKTRACE: "1"

      # Local dev: use sandbox-a and sandbox-b instead of Railway
      LOCAL_DEV_MODE: "true"
      LOCAL_SANDBOX_A_URL: "http://sandbox-a:8080"
      LOCAL_SANDBOX_B_URL: "http://sandbox-b:8080"
    ports:
      - "3000:3000"
    volumes:
      # Mount experience episodes directory for PHI LOOP recording
      - ../.trinity/experience/episodes:/app/episodes
    networks:
      - t27-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────
  # Sandbox A — Test sandbox instance (mirrors Railway container locally)
  # ─────────────────────────────────────────────────────────────────────────
  sandbox-a:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: t27-sandbox-a
    restart: unless-stopped
    environment:
      # Simulated session identity
      T27_SESSION_ID: "local-sandbox-a"
      SANDBOX_NAME: "sandbox-a"

      # Git repo to clone (optional for local dev)
      REPO_URL: ${TEST_REPO_URL:-}
      BRANCH: ${TEST_BRANCH:-main}
      GH_TOKEN: ${GH_TOKEN:-}

      # LLM API keys (optional for local dev — opencode works without them)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # OpenCode web mode
      OPENCODE_WEB_PORT: "8080"
      OPENCODE_NO_AUTO_UPDATE: "1"
    ports:
      - "8081:8080"  # Access sandbox-a at http://localhost:8081
    volumes:
      - sandbox-a-workspace:/workspace
    networks:
      - t27-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18    # 90s startup window (18 × 5s)
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Sandbox B — Second test sandbox instance for multi-session testing
  # ─────────────────────────────────────────────────────────────────────────
  sandbox-b:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: t27-sandbox-b
    restart: unless-stopped
    environment:
      T27_SESSION_ID: "local-sandbox-b"
      SANDBOX_NAME: "sandbox-b"
      REPO_URL: ${TEST_REPO_URL:-}
      BRANCH: ${TEST_BRANCH:-main}
      GH_TOKEN: ${GH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCODE_WEB_PORT: "8080"
      OPENCODE_NO_AUTO_UPDATE: "1"
    ports:
      - "8082:8080"  # Access sandbox-b at http://localhost:8082
    volumes:
      - sandbox-b-workspace:/workspace
    networks:
      - t27-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  t27-internal:
    driver: bridge
    # Mirrors Railway internal network isolation:
    # services can reach each other by container_name, not exposed to host
    # (except via explicitly declared ports above)

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local
  sandbox-a-workspace:
    driver: local
  sandbox-b-workspace:
    driver: local
