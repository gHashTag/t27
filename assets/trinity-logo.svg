<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Trinity Brand Gradient -->
    <linearGradient id="trinity-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D3F2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5D3FF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F2FF2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Deep Midnight Background -->
  <rect width="256" height="256" rx="48" fill="#161616"/>

  <!-- Phi symbol (Φ) -->
  <text x="128" y="180"
        font-family="Georgia, serif"
        font-size="180"
        font-weight="bold"
        text-anchor="middle"
        fill="url(#trinity-gradient)">
    Φ
  </text>

  <!-- Three circles representing Trinity -->
  <circle cx="40" cy="50" r="12" fill="#F5D3F2" opacity="0.9"/>
  <circle cx="128" cy="30" r="12" fill="#5D3FF2" opacity="0.9"/>
  <circle cx="216" cy="50" r="12" fill="#3F2FF2" opacity="0.9"/>
</svg>
