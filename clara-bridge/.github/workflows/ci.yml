name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f examples/requirements.txt ]; then pip install -r examples/requirements.txt; fi

    - name: Run examples
      run: |
        for file in examples/*.py; do
          if [ -f "$file" ]; then
            echo "Running $file..."
            python "$file"
          fi
        done

    - name: Run tests
      run: |
        python tests/run_tests.py

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linter
      run: pip install flake8

    - name: Lint
      run: |
        flake8 examples/*.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 tests/*.py --count --select=E9,F63,F7,F82 --show-source --statistics
