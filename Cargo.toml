[workspace]
resolver = "2"
members = ["bootstrap", "ffi", "bindings/javascript", "gen/rust", "gen/rust/orphan_detection", "gen/rust/https_enforce"]
exclude = ["bindings/python", "tools/converter"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
