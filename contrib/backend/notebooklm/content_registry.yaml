    docs:
      - "https://en.wikipedia.org/wiki/Build_automation"
      - "https://en.wikipedia.org/wiki/Continuous_integration"

  ai_agents:
    name: "AI Agents & LLMs"
    description: "Large language models, agent systems, and AI orchestration"
    youtube:
      - "https://www.youtube.com/watch?v=jkrNMKz9pWU"  # Andrej Karpathy on LLMs
