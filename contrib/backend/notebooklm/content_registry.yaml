# Topic → Content mapping for notebook enrichment
# phi^2 + 1/phi^2 = 3 | TRINITY

topics:
  ternary:
    name: "Ternary Computing"
    description: "Three-state computing systems, balanced ternary, and ternary logic"
    youtube:
      - "https://www.youtube.com/watch?v=Ht5A5Q8-1Q4"  # Ternary computing intro
      - "https://www.youtube.com/watch?v=f2w8EGxKQY0"  # Computerphile on ternary
