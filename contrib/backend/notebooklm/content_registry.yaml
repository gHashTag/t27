      - "https://www.youtube.com/watch?v=xOCk5b5z4r8"  # Three-state systems podcast
    docs:
      - "https://en.wikipedia.org/wiki/Ternary_computer"
      - "https://en.wikipedia.org/wiki/Balanced_ternary"
      - "https://arxiv.org/abs/1702.08559"  # Ternary computing research

  golden_ratio:
    name: "Golden Ratio & Trinity"
    description: "The golden ratio (φ), sacred geometry, and mathematical beauty"
    youtube:
      - "https://www.youtube.com/watch?v=sj8Sg8qnjOg"  # The Golden Ratio
      - "https://www.youtube.com/watch?v=A14v7fjvCw4"  # Donald in Mathmagic Land
