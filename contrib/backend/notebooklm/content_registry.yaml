      - "https://www.youtube.com/watch?v=5oI_5pM0f1o"  # Math podcast on constants
    docs:
      - "https://en.wikipedia.org/wiki/Trinity_(mathematics)"
      - "https://mathworld.wolfram.com/GoldenRatio.html"

  automation:
    name: "Automation & Orchestration"
